# =============================================================================
# lefthook.yml
# =============================================================================
# Git hooks 管理 (lefthook)
#
# pre-commit  : 機械的チェック (oxfmt --fix → oxlint --fix → typecheck)
# pre-push    : 機械的チェック (oxfmt --check / oxlint / typecheck)
#               AI レビューは Stop hook で実施するため、ここでは機械的のみ
#
# 有効化: pnpm install 時に postinstall で `lefthook install` が走り、
#         .git/hooks/ にリンクが作られる。手動操作不要。
# =============================================================================

pre-commit:
  parallel: false # oxfmt と oxlint --fix が同じファイルを書き換える可能性を避ける
  commands:
    exact-versions:
      glob: "{package.json,**/package.json,pnpm-workspace.yaml}"
      run: node ./scripts/check-exact-versions.mjs {staged_files}
    oxfmt:
      glob: "*.{ts,tsx,js,jsx,cjs,mjs}"
      run: ./node_modules/.bin/oxfmt {staged_files}
      stage_fixed: true # autofix で変更されたファイルを自動 stage
    oxlint:
      glob: "*.{ts,tsx,js,jsx,cjs,mjs}"
      run: ./node_modules/.bin/oxlint --fix {staged_files}
      stage_fixed: true
    typecheck:
      run: ./node_modules/.bin/turbo run typecheck

pre-push:
  commands:
    format:
      run: ./node_modules/.bin/turbo run format:check
    lint:
      run: ./node_modules/.bin/turbo run lint
    typecheck:
      run: ./node_modules/.bin/turbo run typecheck
