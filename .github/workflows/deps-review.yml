name: Deps Review

on:
  workflow_call:

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run deps-reviewer
        id: deps_reviewer
        uses: anthropics/claude-code-action@37b464ce72700f7b2c5ff8d2db7fa7b15df792f5 # v1.0.169
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          allowed_bots: "renovate[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            この Renovate PR を deps-reviewer agent でレビューしてください。
            自動マージしても問題ないと判断した場合のみ、以下のコマンドを実行してください:

                gh pr review ${{ github.event.pull_request.number }} --approve

            問題がある場合は PR コメントで指摘し、approve はしないでください。
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh release:*),Bash(pnpm audit:*),Bash(pnpm view:*),Read,Grep,Glob,LS"

      - name: Notify review unavailable
        if: failure() && steps.deps_reviewer.outcome == 'failure'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "$PR_NUMBER" --body "$(cat <<'EOF'
          ## 自動依存レビュー: 実行不可

          `deps-reviewer` による自動レビューを完了できませんでした。

          **想定原因**: この PR が `.github/workflows/` 配下のファイルを変更しているため、`anthropics/claude-code-action` の OIDC→App トークン交換が「workflow ファイルが default branch と一致していること」という検証に失敗し、Claude が認証・起動できません（PR が workflow を改竄してトークンを奪うのを防ぐ GitHub 側のセキュリティ機構）。

          この `deps-review` の失敗は CI の不具合ではなく意図的なゲートです。

          **必要な対応（人手）**:

          - 依存更新の差分を手動でレビューする
          - 問題なければ手動でマージする（Claude が approve できないため `auto-merge.yml` は発火しません）
          EOF
          )"
          exit 1

      - name: Verify approval
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # claude bot による approve が登録されているか確認
          approved=$(gh pr view "$PR_NUMBER" --json reviews \
            --jq '[.reviews[] | select(.author.login == "claude" and .state == "APPROVED")] | length')
          if [ "$approved" -gt 0 ]; then
            echo "Claude bot approved; auto-merge.yml will pick this up"
            exit 0
          fi

          echo "Claude did not approve. Review the PR manually before merging."
          exit 1
