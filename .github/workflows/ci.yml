name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/verify.yml

  review:
    needs: verify
    if: github.actor != 'renovate[bot]'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/review.yml
    secrets: inherit

  deps-review:
    needs: verify
    if: github.actor == 'renovate[bot]'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/deps-review.yml
    secrets: inherit
