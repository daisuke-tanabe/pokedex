name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .tool-versions
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm exec turbo run typecheck lint format:check --continue=always

  review:
    name: review
    needs: validate
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@86eb26bf0139bdd75acd15ea5f00f45ee0a284c2 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          prompt: "/review"
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  deps-review:
    name: deps-review
    needs: validate
    if: |
      github.event_name == 'pull_request' &&
      github.actor == 'renovate[bot]' &&
      needs.validate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run deps-reviewer
        id: deps_reviewer
        uses: anthropics/claude-code-action@86eb26bf0139bdd75acd15ea5f00f45ee0a284c2 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          allowed_bots: "renovate[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            この Renovate PR を deps-reviewer agent でレビューしてください。
            自動マージしても問題ないと判断した場合のみ、以下のコマンドを実行してください:

                gh pr review ${{ github.event.pull_request.number }} --approve

            問題がある場合は PR コメントで指摘し、approve はしないでください。
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh release:*),Bash(pnpm audit:*),Bash(pnpm view:*),Read,Grep,Glob,LS"

      - name: Notify review unavailable
        if: failure() && steps.deps_reviewer.outcome == 'failure'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "$PR_NUMBER" --body "$(cat <<'EOF'
          ## 自動依存レビュー: 実行不可

          `deps-reviewer` による自動レビューを完了できませんでした。

          **想定原因**: この PR が `.github/workflows/` 配下のファイルを変更しているため、`anthropics/claude-code-action` の OIDC→App トークン交換が「workflow ファイルが default branch と一致していること」という検証に失敗し、Claude が認証・起動できません（PR が workflow を改竄してトークンを奪うのを防ぐ GitHub 側のセキュリティ機構）。

          この `deps-review` の失敗は CI の不具合ではなく意図的なゲートです。

          **必要な対応（人手）**:

          - 依存更新の差分を手動でレビューする
          - 問題なければ手動でマージする（Claude が approve できないため `auto-merge.yml` は発火しません）
          EOF
          )"
          exit 1

      - name: Verify approval
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # claude bot による approve が登録されているか確認
          approved=$(gh pr view "$PR_NUMBER" --json reviews \
            --jq '[.reviews[] | select(.author.login == "claude" and .state == "APPROVED")] | length')
          if [ "$approved" -gt 0 ]; then
            echo "Claude bot approved; auto-merge.yml will pick this up"
            exit 0
          fi

          echo "Claude did not approve. Review the PR manually before merging."
          exit 1
