name: CI

on:
  pull_request:
  pull_request_review:
    types: [submitted]
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (${{ matrix.task }})
    if: github.event_name != 'pull_request_review'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [typecheck, lint, format:check]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.task }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.task }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        run: pnpm ${{ matrix.task }}

  review:
    name: review
    needs: validate
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          prompt: "/review"
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  deps-review:
    name: deps-review
    needs: validate
    if: |
      always() &&
      (
        (
          github.event_name == 'pull_request' &&
          github.actor == 'renovate[bot]' &&
          needs.validate.result == 'success'
        ) ||
        (
          github.event_name == 'pull_request_review' &&
          github.event.review.state == 'approved' &&
          github.event.pull_request.user.login == 'renovate[bot]'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run deps-reviewer
        if: github.event_name != 'pull_request_review'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          allowed_bots: "renovate[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            この Renovate PR を deps-reviewer agent でレビューしてください。
            最終行に必ず "FINAL_VERDICT: <Merge|Verify|Investigate|Hold>" を単独行で出力してください。
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh release:*),Bash(pnpm audit:*),Bash(pnpm view:*),Read,Grep,Glob,LS"

      - name: Verify final verdict
        id: verdict
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. PR Review (Approve) で override
          if [ "${{ github.event_name }}" = "pull_request_review" ] \
             && [ "${{ github.event.review.state }}" = "approved" ]; then
            echo "deps-review overridden by submitted PR review (approved)"
            echo "verdict=approved" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. FINAL_VERDICT を抽出 (claude bot コメントに限定して詐称防止)
          verdict=$(gh pr view "$PR_NUMBER" --json comments \
            --jq '.comments[] | select(.author.login == "claude") | .body' \
            | grep -oE 'FINAL_VERDICT:[[:space:]]*[A-Za-z]+' \
            | tail -1 \
            | awk '{print $NF}')
          echo "Final verdict: ${verdict:-unknown}"
          echo "verdict=${verdict:-unknown}" >> "$GITHUB_OUTPUT"

          # 3. Merge / Verify は pass、Investigate / Hold / unknown は fail
          case "$verdict" in
            Merge|Verify)
              exit 0
              ;;
            *)
              echo "Manual review needed: ${verdict:-unknown}"
              echo "If reviewed and approved, submit a PR Review with 'Approve' to override."
              exit 1
              ;;
          esac

      - name: Auto-merge on verdict=Merge
        if: |
          github.event_name == 'pull_request' &&
          steps.verdict.outputs.verdict == 'Merge'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "deps-reviewer 判定が Merge のため自動マージします: PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --squash --delete-branch
