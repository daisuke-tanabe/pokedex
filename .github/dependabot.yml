version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/api"
      - "/apps/web"
      - "/apps/mobile"
      - "/packages/contracts"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      oxc-toolchain:
        patterns:
          - "oxfmt"
          - "oxlint"
          - "oxlint-*"
        update-types:
          - "minor"
          - "patch"
