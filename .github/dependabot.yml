version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      oxc-toolchain:
        patterns:
          - "oxfmt"
          - "oxlint"
          - "oxlint-*"
        update-types:
          - "minor"
          - "patch"
