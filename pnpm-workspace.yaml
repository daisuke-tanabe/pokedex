packages:
  - 'apps/*'
  - 'packages/*'
catalog:
  oxfmt: 0.59.0
  oxlint: 1.74.0
  oxlint-tsgolint: 0.25.0
  vitest: 4.1.10
allowBuilds:
  # lefthook は npm パッケージに binary が同梱されており、postinstall の
  # build script は不要 (実測で `./node_modules/.bin/lefthook` が直接動作する)
  lefthook: false
  # vitest が依存する esbuild は postinstall でネイティブバイナリを取得する
  # 必要があるため明示的に許可する。
  esbuild: true
  # MSW の postinstall は browser worker (service worker) のコピーを行うが、
  # Node 用テスト (setupServer) では不要。明示的に拒否する。
  msw: false
  # next/image が依存する sharp はネイティブバイナリの取得が必要なため許可する。
  sharp: true
# サプライチェーン対策: 公開から 4320 分 (3 日) 未満のバージョンはインストールを拒否する。
# renovate.json の minimumReleaseAge と値を揃え、ローカル / CI / Renovate のすべてで
# 一貫してゲートを効かせる。strict は minimumReleaseAge の明示設定により自動有効になるが、
# 意図を明示するため併記する。
minimumReleaseAge: 4320
minimumReleaseAgeStrict: true
